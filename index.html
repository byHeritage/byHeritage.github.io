<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Business Portfolio</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- HEADER / HERO -->
  <header>
    <h1>Your Business Name</h1>
    <p>A short tagline about what you do</p>
    <a href="#contact" class="btn">Get In Touch</a>
  </header>

  <!-- ABOUT -->
  <section id="about">
    <h2>About Us</h2>
    <p>Tell your story here — who you are, what you do, who you serve.</p>
  </section>

  <!-- GALLERY / PORTFOLIO -->
  <section id="portfolio">
    <h2>Our Work</h2>
    <div class="gallery">
      <img src="images/project1.jpg" alt="Project 1" />
      <img src="images/project2.jpg" alt="Project 2" />
      <img src="images/project3.jpg" alt="Project 3" />
      <!-- Add more as needed -->
    </div>
  </section>

  <!-- CONTACT -->
  <section id="contact">
    <h2>Contact Us</h2>
    <p>Email: <a href="mailto:you@email.com">you@email.com</a></p>
    <p>Phone: +234 XXX XXX XXXX</p>
  </section>

  <footer>
    <p>&copy; 2026 Your Business Name</p>
  </footer>

</body>
</html>
